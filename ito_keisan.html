<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="糸計算">
<meta name="theme-color" content="#1a1a2e">
<title>糸計算アプリ</title>
<style>
:root {
  --bg: #f4f4f8;
  --surface: #ffffff;
  --surface2: #f0f0f5;
  --border: #e0e0ea;
  --text: #1a1a2e;
  --text2: #6b6b80;
  --accent: #3d5af1;
  --accent-light: #eef0fe;
  --success: #0e9f6e;
  --success-light: #e8f8f2;
  --radius: 14px;
  --radius-sm: 9px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0f0f1a;
    --surface: #1c1c2e;
    --surface2: #252538;
    --border: #2e2e45;
    --text: #f0f0f8;
    --text2: #8888aa;
    --accent: #6b7fff;
    --accent-light: #1a1f3e;
    --success: #34d399;
    --success-light: #0a2e20;
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, 'Helvetica Neue', sans-serif; }

.shell {
  display: flex;
  flex-direction: column;
  height: 100%;
  max-width: 480px;
  margin: 0 auto;
}

.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: calc(var(--safe-top) + 16px) 20px 16px;
  flex-shrink: 0;
}
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
.header p { font-size: 13px; color: var(--text2); margin-top: 2px; }

.tabs {
  display: flex;
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 4px;
  margin: 16px 16px 0;
  flex-shrink: 0;
}
.tab {
  flex: 1;
  padding: 10px 8px;
  border: none;
  background: none;
  border-radius: calc(var(--radius) - 4px);
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
  line-height: 1.3;
}
.tab.on {
  background: var(--surface);
  color: var(--accent);
  box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}

.scroll-area {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  padding-bottom: calc(var(--safe-bottom) + 20px);
  -webkit-overflow-scrolling: touch;
}

.sec { display: none; }
.sec.on { display: block; }

.card {
  background: var(--surface);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
  border: 1px solid var(--border);
}
.card-title {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 14px;
}

.field { margin-bottom: 12px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text2);
  margin-bottom: 6px;
}
.field select, .field input {
  width: 100%;
  height: 48px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface2);
  color: var(--text);
  font-size: 16px;
  padding: 0 14px;
  appearance: none;
  -webkit-appearance: none;
  outline: none;
  transition: border-color 0.15s;
}
.field select:focus, .field input:focus {
  border-color: var(--accent);
}
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.btn {
  width: 100%;
  height: 52px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  margin-top: 4px;
  letter-spacing: -0.2px;
  transition: opacity 0.15s, transform 0.1s;
}
.btn:active { opacity: 0.85; transform: scale(0.98); }

.result-card {
  background: var(--success-light);
  border: 1.5px solid var(--success);
  border-radius: var(--radius);
  padding: 20px 16px 16px;
  margin-bottom: 14px;
  display: none;
}
.result-label { font-size: 12px; font-weight: 600; color: var(--success); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
.result-main { font-size: 48px; font-weight: 800; color: var(--success); letter-spacing: -2px; line-height: 1; }
.result-unit { font-size: 20px; font-weight: 600; margin-left: 4px; }
.result-note { font-size: 13px; color: var(--success); opacity: 0.8; margin-top: 6px; }

.metrics {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-top: 14px;
}
.metric {
  background: rgba(0,0,0,0.05);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}
@media (prefers-color-scheme: dark) {
  .metric { background: rgba(255,255,255,0.05); }
}
.metric-val { font-size: 18px; font-weight: 700; color: var(--success); }
.metric-lbl { font-size: 11px; color: var(--success); opacity: 0.8; margin-top: 2px; }

.warn {
  font-size: 13px;
  color: #e55;
  margin-top: 10px;
  padding: 10px 12px;
  background: #fff0f0;
  border-radius: var(--radius-sm);
  display: none;
}
@media (prefers-color-scheme: dark) {
  .warn { background: #2e1515; color: #ff8888; }
}

.item-row {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 12px;
  margin-bottom: 8px;
  border: 1px solid var(--border);
}
.item-row-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}
.item-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  background: var(--accent-light);
  padding: 3px 8px;
  border-radius: 20px;
}
.rm-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  width: 28px;
  height: 28px;
  font-size: 16px;
  color: var(--text2);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.rm-btn:active { background: #fee; }

.add-btn {
  width: 100%;
  height: 46px;
  background: none;
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  color: var(--text2);
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 12px;
  transition: border-color 0.15s, color 0.15s;
}
.add-btn:active { border-color: var(--accent); color: var(--accent); }

.detail-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
  font-size: 13px;
}
.detail-table th {
  text-align: right;
  font-size: 11px;
  font-weight: 600;
  color: var(--success);
  opacity: 0.8;
  padding: 4px 6px;
  border-bottom: 1px solid rgba(14,159,110,0.2);
}
.detail-table th:first-child { text-align: left; }
.detail-table td {
  padding: 7px 6px;
  color: var(--success);
  text-align: right;
  border-bottom: 1px solid rgba(14,159,110,0.1);
}
.detail-table td:first-child { text-align: left; font-weight: 500; }
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <h1>🎣 糸計算</h1>
    <p>重さ→個数 / 個数→必要重量</p>
  </div>

  <div class="tabs">
    <button class="tab on" onclick="sw('kg')">重さ →<br>何個できる？</button>
    <button class="tab" onclick="sw('cnt')">何個作りたい →<br>必要な重量</button>
  </div>

  <div class="scroll-area">

    <!-- パターン① 重さ→個数 -->
    <div id="s-kg" class="sec on">
      <div class="card">
        <div class="card-title">糸の情報</div>
        <div class="row2">
          <div class="field">
            <label>種類</label>
            <select id="kg-type" onchange="loadSizes('kg')">
              <option value="">選択...</option>
              <option>NL</option><option>FC</option><option>PET</option>
            </select>
          </div>
          <div class="field">
            <label>サイズ（号）</label>
            <select id="kg-size"><option value="">先に種類を</option></select>
        <div id="kg-dbadge" style="display:none;font-size:13px;color:var(--accent);background:var(--accent-light);padding:5px 10px;border-radius:6px;margin-top:6px;font-weight:500;"></div>
          </div>
        </div>
        <div class="row2">
          <div class="field">
            <label>商品長さ（m/個）</label>
            <input type="number" id="kg-len" placeholder="300" inputmode="decimal" />
          </div>
          <div class="field">
            <label>手持ち重量（kg）</label>
            <input type="number" id="kg-weight" placeholder="5.0" inputmode="decimal" step="0.001" />
          </div>
        </div>
        <button class="btn" onclick="calcKg()">何個できるか計算</button>
        <div class="warn" id="kg-warn"></div>
      </div>

      <div class="result-card" id="kg-ans">
        <div class="result-label">製造できる個数</div>
        <div><span class="result-main" id="kg-r-count">—</span><span class="result-unit">個</span></div>
        <div class="result-note" id="kg-r-note"></div>
        <div class="metrics">
          <div class="metric">
            <div class="metric-val" id="kg-r-usedlen">—</div>
            <div class="metric-lbl">使用長さ(m)</div>
          </div>
          <div class="metric">
            <div class="metric-val" id="kg-r-usedkg">—</div>
            <div class="metric-lbl">使用重量(kg)</div>
          </div>
          <div class="metric">
            <div class="metric-val" id="kg-r-remain">—</div>
            <div class="metric-lbl">余り(g)</div>
          </div>
        </div>
      </div>
    </div>

    <!-- パターン② 個数→重量 -->
    <div id="s-cnt" class="sec">
      <div class="card">
        <div class="card-title">品番・個数を入力</div>
        <div id="items"></div>
        <button class="add-btn" onclick="addItem()">＋ 品番を追加</button>
        <button class="btn" onclick="calcCnt()">必要な総重量を計算</button>
        <div class="warn" id="cnt-warn"></div>
      </div>

      <div class="result-card" id="cnt-ans">
        <div class="result-label">必要な総重量</div>
        <div><span class="result-main" id="cnt-r-kg">—</span><span class="result-unit">kg</span></div>
        <div class="result-note" id="cnt-r-note"></div>
        <div class="metrics" style="grid-template-columns:1fr 1fr;">
          <div class="metric">
            <div class="metric-val" id="cnt-r-len">—</div>
            <div class="metric-lbl">総長さ(m)</div>
          </div>
          <div class="metric">
            <div class="metric-val" id="cnt-r-g">—</div>
            <div class="metric-lbl">総重量(g)</div>
          </div>
        </div>
        <div id="cnt-detail"></div>
      </div>
    </div>

  </div>
</div>

<script>
// [size, kgm, diameter_mm, lb]
const D={
  NL:{list:[["0.1",409090,0.052,null],["0.15",272727,0.064,null],["0.2",204545,0.074,null],["0.25",163636,0.083,null],["0.3",136363,0.09,null],["0.35",116883,0.095,null],["0.4",102272,0.104,null],["0.5",81818,0.117,null],["0.6",68181,0.128,null],["0.8",51136,0.148,null],["1",40909,0.165,null],["1.2",34090,0.185,null],["1.5",27272,0.205,null],["2",20454,0.235,null],["2.5",16363,0.26,null],["3",13636,0.285,null],["3.5",11688,0.31,null],["4",10227,0.33,16],["5",8181,0.37,20],["6",6818,0.405,null],["7",5844,0.435,25],["8",5113,0.47,30],["10",4090,0.52,35],["12",3409,0.57,40],["14",2922,0.62,50],["16",2556,0.66,null],["20",2045,0.74,70],["22",1821,0.78,80],["24",1705,0.81,90],["26",1573,0.84,null],["28",1461,0.87,100],["30",1363,0.91,null],["35",1168,0.98,130],["40",1022,1.05,null],["50",818,1.17,null],["60",681,1.28,null],["70",584,1.39,null],["80",511,1.48,null],["90",454,1.57,null],["100",409,1.66,null],["110",371,1.74,null],["120",340,1.81,null],["130",314,1.88,null],["150",272,2.03,null],["180",227,2.21,null],["200",204,2.34,null],["250",163,2.61,null],["300",136,2.86,null]]},
  FC:{list:[["0.2",110000,0.077,null],["0.25",95000,0.084,null],["0.3",82000,0.094,null],["0.35",71000,0.104,null],["0.4",60000,0.112,null],["0.5",48000,0.125,null],["0.6",38135,0.145,null],["0.8",27272,0.161,null],["1",21531,0.179,null],["1.2",17208,0.201,null],["1.5",14218,0.221,null],["1.75",12342,0.239,null],["2",10465,0.257,null],["2.5",9127,0.277,null],["3",7500,0.307,null],["3.5",6691,0.326,null],["4",5882,0.345,null],["5",4719,0.385,16],["6",3947,0.421,20],["7",3454,0.448,25],["8",2975,0.486,30],["10",2318,0.55,35],["12",2024,0.588,40],["14",1764,0.629,50],["16",1545,0.673,60],["18",1373,0.715,null],["20",1228,0.756,70],["22",1048,0.828,80],["24",961,0.865,null],["26",886,0.901,null],["28",824,0.934,null],["30",769,0.967,100],["40",584,1.11,130],["50",476,1.22,null],["60",400,1.34,null],["70",357,1.41,null],["80",328,1.48,null],["100",250,1.7,null],["110",227,1.78,null],["120",206,1.87,null],["150",167,2.07,null]]},
  PET:{list:[["0.3",105262,0.09,null],["0.35",90225,0.095,null],["0.4",78946,0.104,null],["0.5",63157,0.117,null],["0.6",52630,0.128,null],["0.8",39473,0.148,null],["1",31578,0.165,null],["1.2",26315,0.185,null],["1.5",21052,0.205,null],["2",15789,0.235,null],["2.5",12631,0.26,null],["3",10526,0.285,null]]}
};

function getItem(t,s){return D[t]&&D[t].list.find(r=>r[0]===s);}
// NLは商品長さに3%増し
function effectiveLen(type,lenM){return type==='NL'?lenM*1.03:lenM;}

function showDiameterBadge(badgeId,type,size){
  const badge=document.getElementById(badgeId);
  if(!badge)return;
  const item=getItem(type,size);
  if(item&&item[2]){
    let txt='糸径：φ '+item[2]+' mm';
    if(item[3]) txt+='　／　'+item[3]+' lb';
    badge.style.display='block';badge.textContent=txt;
  } else{badge.style.display='none';}
}

function loadSizes(pfx){
  const t=document.getElementById(pfx+'-type').value;
  const sel=document.getElementById(pfx+'-size');
  sel.innerHTML='';
  if(!t){sel.innerHTML='<option value="">先に種類を</option>';const b=document.getElementById(pfx+'-dbadge');if(b)b.style.display='none';return;}
  D[t].list.forEach(r=>{const o=document.createElement('option');o.value=r[0];o.textContent=r[0]+'号'+(r[3]?'  ('+r[3]+'lb)':'');sel.appendChild(o);});
  showDiameterBadge(pfx+'-dbadge',t,sel.value);
  sel.onchange=()=>showDiameterBadge(pfx+'-dbadge',t,sel.value);
}

function sw(id){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('on',(i===0&&id==='kg')||(i===1&&id==='cnt')));
  document.getElementById('s-kg').classList.toggle('on',id==='kg');
  document.getElementById('s-cnt').classList.toggle('on',id==='cnt');
}

function warn(id,msg){const el=document.getElementById(id);el.style.display=msg?'block':'none';el.textContent=msg||'';}

function calcKg(){
  const type=document.getElementById('kg-type').value;
  const size=document.getElementById('kg-size').value;
  const lenM=parseFloat(document.getElementById('kg-len').value);
  const weightKg=parseFloat(document.getElementById('kg-weight').value);
  if(!type||!size||isNaN(lenM)||lenM<=0||isNaN(weightKg)||weightKg<=0){warn('kg-warn','すべての項目を入力してください。');return;}
  const item=getItem(type,size);
  if(!item){warn('kg-warn','データが見つかりません。');return;}
  warn('kg-warn','');
  const mPerKg=item[1];
  const actualLen=effectiveLen(type,lenM);
  const totalM=weightKg*mPerKg;
  const count=Math.floor(totalM/actualLen);
  const usedM=count*actualLen;
  const usedKg=usedM/mPerKg;
  const remainG=(weightKg-usedKg)*1000;
  const nlNote=type==='NL'?' (入力'+lenM+'m＋3%増し='+actualLen.toFixed(1)+'m/個)':'';
  document.getElementById('kg-r-count').textContent=count.toLocaleString();
  document.getElementById('kg-r-note').textContent=type+' '+size+'号 ／ '+actualLen.toFixed(1)+'m/個'+nlNote+' ／ 手持ち'+weightKg+'kg';
  document.getElementById('kg-r-usedlen').textContent=(count*lenM).toLocaleString('ja-JP',{maximumFractionDigits:0});
  document.getElementById('kg-r-usedkg').textContent=usedKg.toFixed(3);
  document.getElementById('kg-r-remain').textContent=remainG.toFixed(1);
  document.getElementById('kg-ans').style.display='block';
  document.getElementById('kg-ans').scrollIntoView({behavior:'smooth',block:'nearest'});
}

let ic=0;
function addItem(){
  const c=document.getElementById('items');
  const id=++ic;
  const d=document.createElement('div');
  d.id='item-'+id;
  d.className='item-row';
  d.innerHTML='<div class="item-row-header"><span class="item-num">品番 '+id+'</span><button class="rm-btn" onclick="document.getElementById(\'item-'+id+'\').remove()">×</button></div>'
    +'<div class="row2" style="margin-bottom:10px">'
    +'<div class="field" style="margin-bottom:0"><label>種類</label><select id="it-'+id+'-t" onchange="loadItemSizes('+id+')"><option value="">選択...</option><option>NL</option><option>FC</option><option>PET</option></select></div>'
    +'<div class="field" style="margin-bottom:0"><label>サイズ（号）</label><select id="it-'+id+'-s" onchange="showItemDiameter('+id+')"><option value="">先に種類を</option></select>'
    +'<div id="it-'+id+'-dbadge" style="display:none;font-size:12px;color:var(--accent);background:var(--accent-light);padding:4px 8px;border-radius:6px;margin-top:5px;font-weight:500;"></div></div></div>'
    +'<div class="row2">'
    +'<div class="field" style="margin-bottom:0"><label id="it-'+id+'-llabel">長さ（m/個）</label><input type="number" id="it-'+id+'-l" placeholder="300" inputmode="decimal" oninput="updateLenLabel('+id+')" /></div>'
    +'<div class="field" style="margin-bottom:0"><label>個数</label><input type="number" id="it-'+id+'-q" placeholder="1" value="1" inputmode="numeric" /></div></div>';
  c.appendChild(d);
}

function loadItemSizes(id){
  const t=document.getElementById('it-'+id+'-t').value;
  const s=document.getElementById('it-'+id+'-s');
  s.innerHTML='';
  if(!t){s.innerHTML='<option value="">先に種類を</option>';document.getElementById('it-'+id+'-dbadge').style.display='none';return;}
  D[t].list.forEach(r=>{const o=document.createElement('option');o.value=r[0];o.textContent=r[0]+'号　φ'+r[2]+'mm';s.appendChild(o);});
  showItemDiameter(id);
  updateLenLabel(id);
}

function showItemDiameter(id){
  const t=document.getElementById('it-'+id+'-t').value;
  const size=document.getElementById('it-'+id+'-s').value;
  const badge=document.getElementById('it-'+id+'-dbadge');
  const item=getItem(t,size);
  if(item&&item[2]){let txt='糸径：φ '+item[2]+' mm';if(item[3])txt+='　／　'+item[3]+' lb';badge.style.display='block';badge.textContent=txt;}
  else{badge.style.display='none';}
  updateLenLabel(id);
}

function updateLenLabel(id){
  const t=document.getElementById('it-'+id+'-t').value;
  const len=parseFloat(document.getElementById('it-'+id+'-l').value);
  const label=document.getElementById('it-'+id+'-llabel');
  if(t==='NL'&&!isNaN(len)&&len>0){
    label.textContent='長さ（m/個）+3%→'+(len*1.03).toFixed(1)+'m';
    label.style.color='var(--accent)';
  } else if(t==='NL'){
    label.textContent='長さ（m/個）※NL:3%増し';
    label.style.color='var(--accent)';
  } else {
    label.textContent='長さ（m/個）';
    label.style.color='';
  }
}

function calcCnt(){
  let totalM=0,totalG=0,rows='',valid=false;
  for(let i=1;i<=ic;i++){
    const te=document.getElementById('it-'+i+'-t');
    if(!te)continue;
    const type=te.value,size=document.getElementById('it-'+i+'-s').value;
    const len=parseFloat(document.getElementById('it-'+i+'-l').value);
    const qty=parseInt(document.getElementById('it-'+i+'-q').value)||1;
    if(!type||!size||isNaN(len)||len<=0)continue;
    const item=getItem(type,size);
    if(!item)continue;
    valid=true;
    const actualLen=effectiveLen(type,len);
    const lineM=actualLen*qty;
    const lineG=(lineM/item[1])*1000;
    totalM+=lineM;totalG+=lineG;
    const nlTag=type==='NL'?' <span style="font-size:10px;opacity:0.7">(+3%済)</span>':'';
    rows+='<tr><td>'+type+' '+size+'号</td><td>'+actualLen.toFixed(1)+'m×'+qty+nlTag+'</td><td>'+lineM.toLocaleString('ja-JP',{maximumFractionDigits:1})+'m</td><td>'+lineG.toFixed(1)+'g</td></tr>';
  }
  if(!valid){warn('cnt-warn','品番を1つ以上追加して入力してください。');return;}
  warn('cnt-warn','');
  const totalKg=totalG/1000;
  document.getElementById('cnt-r-kg').textContent=totalKg.toFixed(3);
  document.getElementById('cnt-r-note').textContent='合計 '+totalM.toLocaleString('ja-JP',{maximumFractionDigits:1})+'m（NLは3%増し済み）';
  document.getElementById('cnt-r-len').textContent=totalM.toLocaleString('ja-JP',{maximumFractionDigits:0});
  document.getElementById('cnt-r-g').textContent=totalG.toFixed(1);
  document.getElementById('cnt-detail').innerHTML='<table class="detail-table"><thead><tr><th>種類</th><th>長さ×個数</th><th>小計</th><th>重さ</th></tr></thead><tbody>'+rows+'</tbody></table>';
  document.getElementById('cnt-ans').style.display='block';
  document.getElementById('cnt-ans').scrollIntoView({behavior:'smooth',block:'nearest'});
}

addItem();

</script>
</body>
</html>
