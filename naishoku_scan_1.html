<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>内職 入荷スキャン</title>
<style>
  :root{
    --bg:#F2F0E8;
    --surface:#FFFFFF;
    --ink:#1F2A33;
    --ink-soft:#5B6670;
    --accent:#2F6F62;
    --accent-dark:#204C43;
    --accent-2:#B8901F;
    --line:#DEDACB;
    --danger:#B54B3A;
    --radius:14px;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:48px;
  }
  .mono{font-family:"SFMono-Regular","Menlo","Consolas",monospace; letter-spacing:0.02em;}
  header.topbar{
    position:sticky; top:0; z-index:20;
    background:var(--accent-dark);
    color:#fff;
    padding:14px 16px;
    display:flex; align-items:center; gap:10px;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
  }
  header.topbar h1{
    font-size:17px; font-weight:700; margin:0; letter-spacing:0.02em;
  }
  header.topbar .sub{
    font-size:11px; color:#CFE3DC; margin-top:1px;
  }
  .spool{width:30px;height:30px;flex-shrink:0;}
  .wrap{max-width:520px;margin:0 auto;padding:14px 14px 0;}
  .card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:16px;
    margin-bottom:14px;
    box-shadow:0 1px 3px rgba(31,42,51,0.08);
    border:1px solid var(--line);
  }
  .card h2{
    font-size:12px; font-weight:700; color:var(--accent-dark);
    letter-spacing:0.08em; margin:0 0 10px;
    display:flex; align-items:center; gap:6px;
  }
  .card h2 .num{
    background:var(--accent); color:#fff; width:18px;height:18px;border-radius:50%;
    display:inline-flex;align-items:center;justify-content:center;font-size:11px;
  }
  input[type=text],input[type=number],input[type=date],select{
    width:100%; padding:11px 12px; font-size:16px;
    border:1px solid var(--line); border-radius:10px;
    background:#FBFAF6; color:var(--ink);
  }
  input:focus,select:focus{outline:2px solid var(--accent); outline-offset:1px;}
  .worker-chip{
    display:flex; align-items:center; justify-content:space-between;
    background:#EAF3EF; border:1px solid var(--accent);
    border-radius:10px; padding:10px 12px;
  }
  .worker-chip .name{font-weight:700; font-size:15px;}
  .worker-chip .code{font-size:11px; color:var(--ink-soft);}
  .btn{
    border:none; border-radius:10px; padding:11px 16px;
    font-size:14px; font-weight:700; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; gap:6px;
  }
  .btn-primary{background:var(--accent); color:#fff;}
  .btn-primary:active{background:var(--accent-dark);}
  .btn-outline{background:#fff; color:var(--accent-dark); border:1px solid var(--accent);}
  .btn-ghost{background:transparent; color:var(--ink-soft); border:1px solid var(--line);}
  .btn-danger{background:transparent; color:var(--danger); border:1px solid var(--danger);}
  .btn-block{width:100%;}
  .btn:disabled{opacity:0.45; cursor:not-allowed;}
  .worker-list{max-height:240px; overflow-y:auto; border:1px solid var(--line); border-radius:10px; margin-top:8px;}
  .worker-item{
    padding:10px 12px; border-bottom:1px solid var(--line); cursor:pointer; font-size:14px;
    display:flex; justify-content:space-between; align-items:center;
  }
  .worker-item:last-child{border-bottom:none;}
  .worker-item:active{background:#EAF3EF;}
  .worker-item .code{font-size:11px; color:var(--ink-soft);}
  .tag{
    font-size:10px; padding:2px 6px; border-radius:20px; font-weight:700;
  }
  .tag-maki{background:#E4EEE9; color:var(--accent-dark);}
  .tag-shiage{background:#F4EAD2; color:var(--accent-2);}
  .scan-row{display:flex; gap:8px;}
  .scan-row .btn{flex:1;}
  #searchResults{margin-top:8px; max-height:260px; overflow-y:auto;}
  .result-item{
    padding:10px 12px; border:1px solid var(--line); border-radius:10px; margin-bottom:6px; cursor:pointer;
  }
  .result-item:active{background:#EAF3EF;}
  .result-item .code{font-size:12px; color:var(--accent-dark); font-weight:700;}
  .result-item .name{font-size:13px; margin-top:2px;}
  .product-selected{
    background:#EAF3EF; border:1px solid var(--accent); border-radius:10px; padding:12px;
  }
  .product-selected .code{font-size:13px; font-weight:700; color:var(--accent-dark);}
  .product-selected .name{font-size:14px; margin-top:3px; line-height:1.4;}
  .product-selected .jan{font-size:11px; color:var(--ink-soft); margin-top:4px;}
  .qty-row{display:flex; align-items:center; gap:10px; margin-top:12px;}
  .qty-row button{
    width:42px; height:42px; border-radius:10px; border:1px solid var(--line);
    background:#fff; font-size:20px; font-weight:700; color:var(--accent-dark); cursor:pointer;
  }
  .qty-row input{text-align:center; font-size:18px; font-weight:700; max-width:90px;}
  label.field-label{display:block; font-size:11px; color:var(--ink-soft); margin:10px 0 4px; font-weight:700;}
  .empty{
    text-align:center; padding:26px 10px; color:var(--ink-soft); font-size:13px;
  }
  .filter-row{display:flex; gap:8px; margin-bottom:10px;}
  .filter-row > *{flex:1;}
  table.log{width:100%; border-collapse:collapse; font-size:12.5px;}
  table.log th{
    text-align:left; font-size:10px; color:var(--ink-soft); padding:6px 6px; border-bottom:1px solid var(--line);
    letter-spacing:0.04em;
  }
  table.log td{padding:8px 6px; border-bottom:1px solid var(--line); vertical-align:top;}
  table.log tr:last-child td{border-bottom:none;}
  .del-btn{background:none;border:none;color:var(--ink-soft);font-size:16px;cursor:pointer;padding:2px 6px;}
  .summary-bar{
    display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft);
    margin-bottom:10px; padding:0 2px;
  }
  .summary-bar b{color:var(--ink); font-size:14px;}
  #cameraModal{
    position:fixed; inset:0; background:#000; z-index:100; display:none;
    flex-direction:column;
  }
  #cameraModal video{flex:1; width:100%; object-fit:cover; background:#000;}
  .cam-frame{
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    width:78%; max-width:340px; height:120px;
    border:2px solid #fff; border-radius:12px; box-shadow:0 0 0 2000px rgba(0,0,0,0.35);
    pointer-events:none;
  }
  .cam-topbar{
    position:absolute; top:0; left:0; right:0; padding:14px 16px;
    display:flex; justify-content:space-between; align-items:center; color:#fff; z-index:2;
    background:linear-gradient(rgba(0,0,0,0.5),transparent);
  }
  .cam-topbar button{
    background:rgba(255,255,255,0.15); color:#fff; border:none; border-radius:8px;
    padding:8px 14px; font-size:13px; font-weight:700;
  }
  .cam-hint{
    position:absolute; bottom:36px; left:0; right:0; text-align:center; color:#fff; font-size:13px; z-index:2;
  }
  #toast{
    position:fixed; left:50%; bottom:28px; transform:translateX(-50%) translateY(20px);
    background:var(--accent-dark); color:#fff; padding:12px 20px; border-radius:30px;
    font-size:13px; font-weight:700; opacity:0; pointer-events:none; transition:all 0.25s ease;
    z-index:200; display:flex; align-items:center; gap:8px; white-space:nowrap;
  }
  #toast.show{opacity:1; transform:translateX(-50%) translateY(0);}
  .toast-spool{width:16px;height:16px;}
  .toast-spool .thread{
    stroke-dasharray:40; stroke-dashoffset:40;
    animation:wind 0.6s ease forwards;
  }
  @keyframes wind{to{stroke-dashoffset:0;}}
  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--line); border-radius:6px;}
</style>
</head>
<body>

<header class="topbar">
  <svg class="spool" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="6" y="8" width="4" height="24" rx="1.5" fill="#CFE3DC"/>
    <rect x="30" y="8" width="4" height="24" rx="1.5" fill="#CFE3DC"/>
    <ellipse cx="20" cy="20" rx="10" ry="9" fill="none" stroke="#E8B84B" stroke-width="2"/>
    <path d="M11 20c3-4 6-6 9-6s6 2 9 6c-3 4-6 6-9 6s-6-2-9-6z" fill="none" stroke="#E8B84B" stroke-width="1.4" opacity="0.85"/>
  </svg>
  <div>
    <h1>内職 入荷スキャン</h1>
    <div class="sub">ラインシステム / 加工委託 入荷管理</div>
  </div>
</header>

<div class="wrap">

  <div id="gasWarning" class="card" style="display:none; background:#FBEDE9; border-color:var(--danger);">
    <div style="font-size:12px; font-weight:700; color:var(--danger); margin-bottom:4px;">⚠ 共有一覧が未設定です</div>
    <div style="font-size:12px; color:var(--ink-soft); line-height:1.5;">
      HTMLファイル内の <span class="mono">GAS_URL</span> に、Google Apps Script のウェブアプリURLを設定してください。設定するまでは、一覧の読み込み・登録ができません。
    </div>
  </div>

  <!-- STEP 1: worker -->
  <div class="card">
    <h2><span class="num">1</span>内職さんを選択</h2>
    <div id="workerChipArea"></div>
    <div id="workerPicker" style="display:none;">
      <input type="text" id="workerSearch" placeholder="名前・コードで検索">
      <div class="worker-list" id="workerList"></div>
    </div>
  </div>

  <!-- STEP 2: scan -->
  <div class="card" id="scanCard" style="display:none;">
    <h2><span class="num">2</span>商品をスキャン / 検索</h2>
    <div class="scan-row">
      <button class="btn btn-primary" id="openCameraBtn">📷 バーコードをスキャン</button>
    </div>
    <label class="field-label">商品コード・商品名で手入力検索</label>
    <input type="text" id="manualSearch" placeholder="例）039004 / SQUID LEADER">
    <div id="searchResults"></div>
  </div>

  <!-- STEP 3: confirm -->
  <div class="card" id="confirmCard" style="display:none;">
    <h2><span class="num">3</span>数量を入力して登録</h2>
    <div id="productSelected"></div>
    <label class="field-label">数量</label>
    <div class="qty-row">
      <button id="qtyMinus" type="button">−</button>
      <input type="number" id="qtyInput" value="1" min="1" inputmode="numeric">
      <button id="qtyPlus" type="button">＋</button>
    </div>
    <label class="field-label">備考（任意）</label>
    <input type="text" id="noteInput" placeholder="例）一部不良あり">
    <div style="margin-top:14px; display:flex; gap:8px;">
      <button class="btn btn-ghost" id="cancelProductBtn">やり直す</button>
      <button class="btn btn-primary btn-block" id="registerBtn">登録する</button>
    </div>
  </div>

  <!-- LOG -->
  <div class="card">
    <h2><span class="num">4</span>入荷一覧（共有）</h2>
    <div class="filter-row">
      <input type="date" id="filterDate">
      <select id="filterWorker"><option value="">内職さん：すべて</option></select>
    </div>
    <div class="summary-bar">
      <span>件数 <b id="sumCount">0</b></span>
      <span>合計数量 <b id="sumQty">0</b></span>
      <button class="btn btn-ghost" id="refreshBtn" style="padding:4px 10px;font-size:11px;">更新</button>
    </div>
    <div id="logArea"><div class="empty">読み込み中…</div></div>
  </div>

  <div style="text-align:center; padding:6px 0 20px; font-size:11px; color:var(--ink-soft);">
    このリンクを開いた人は全員、同じ入荷一覧を見られます
  </div>
</div>

<!-- camera modal -->
<div id="cameraModal">
  <div class="cam-topbar">
    <span style="font-size:13px;">バーコードをかざしてください</span>
    <button id="closeCameraBtn">閉じる</button>
  </div>
  <video id="video" muted playsinline autoplay></video>
  <div class="cam-frame"></div>
  <div class="cam-hint" id="camHint">カメラを起動しています…</div>
</div>

<div id="toast">
  <svg class="toast-spool" viewBox="0 0 40 40"><circle class="thread" cx="20" cy="20" r="7" fill="none" stroke="#fff" stroke-width="3"/></svg>
  <span id="toastMsg"></span>
</div>

function workerType(name){
  const m = name.match(/\(([^)]+)\)|（([^）]+)）/g);
  if(!m) return null;
  const last = m[m.length-1];
  if(last.includes('巻き')) return 'A';
  if(last.includes('仕上げ')) return 'B';
  return null;
}

/* ====================== STORAGE HELPERS (Google Apps Script) ====================== */
// 共有一覧は Google スプレッドシートに保存されます。GAS_URL の設定が必要です。
function gasConfigured(){
  return !!GAS_URL && GAS_URL.indexOf('PUT_YOUR_GAS_WEB_APP_URL_HERE')<0;
}
async function apiListEntries(){
  if(!gasConfigured()){ console.error('GAS_URL が未設定です'); return []; }
  try{
    const res = await fetch(GAS_URL + '?action=list');
    if(!res.ok){ console.error('list failed', res.status); return []; }
    const data = await res.json();
    return Array.isArray(data) ? data : [];
  }catch(e){ console.error('list error', e); return []; }
}
async function apiAddEntry(entry){
  if(!gasConfigured()){ console.error('GAS_URL が未設定です'); return false; }
  try{
    const res = await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'}, // avoids CORS preflight on Apps Script
      body: JSON.stringify({action:'add', entry})
    });
    if(!res.ok){ console.error('add failed', res.status); return false; }
    const data = await res.json();
    return !!(data && data.ok);
  }catch(e){ console.error('add error', e); return false; }
}
async function apiDeleteEntry(id){
  if(!gasConfigured()){ return false; }
  try{
    const res = await fetch(GAS_URL, {
      method:'POST',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({action:'delete', id})
    });
    if(!res.ok){ return false; }
    const data = await res.json();
    return !!(data && data.ok);
  }catch(e){ console.error('delete error', e); return false; }
}
// 内職さんの前回選択はこのブラウザだけに保存（端末ローカル）
function localGet(key){
  try{ const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }catch(e){ return null; }
}
function localSet(key, value){
  try{ localStorage.setItem(key, JSON.stringify(value)); }catch(e){}
}

/* ====================== TOAST ====================== */
function toast(msg){
  const t = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  t.querySelector('.thread').style.animation = 'none';
  void t.offsetWidth;
  t.querySelector('.thread').style.animation = 'wind 0.6s ease forwards';
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(()=>t.classList.remove('show'), 2200);
}

function renderWorkerList(filter){
  const list = document.getElementById('workerList');
  const f = (filter||'').trim().toLowerCase();
  const filtered = WORKERS.filter(w=> !f || w.n.toLowerCase().includes(f) || w.c.toLowerCase().includes(f));
  if(filtered.length===0){ list.innerHTML = '<div class="empty">該当する内職さんがいません</div>'; return; }
  list.innerHTML = filtered.map(w=>{
    const t = workerType(w.n);
    const tagHtml = t==='A' ? '<span class="tag tag-maki">巻き</span>' : t==='B' ? '<span class="tag tag-shiage">仕上げ</span>' : '';
    return `<div class="worker-item" data-code="${escapeHtml(w.c)}">
      <span>${escapeHtml(w.n)} ${tagHtml}</span>
      <span class="code mono">${escapeHtml(w.c)}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.worker-item').forEach(el=>{
    el.onclick = async ()=>{
      const w = WORKERS.find(x=>x.c===el.dataset.code);
      selectedWorker = w;
      localSet('last-worker', w);
      renderWorkerChip();
    };
  });
}

/* ====================== PRODUCT SEARCH ====================== */
function renderSearchResults(query){
  const box = document.getElementById('searchResults');
  const q = (query||'').trim().toLowerCase();
  if(!q){ box.innerHTML=''; return; }
  const matches = PRODUCTS.filter(p=> p.c.toLowerCase().includes(q) || p.n.toLowerCase().includes(q)).slice(0,25);
  if(matches.length===0){ box.innerHTML = '<div class="empty">見つかりません</div>'; return; }
  box.innerHTML = matches.map(p=>`
    <div class="result-item" data-code="${escapeHtml(p.c)}">
      <div class="code mono">${escapeHtml(p.c)}</div>
      <div class="name">${escapeHtml(p.n)}</div>
    </div>`).join('');
  box.querySelectorAll('.result-item').forEach(el=>{
    el.onclick = ()=>{
      const p = PRODUCTS.find(x=>x.c===el.dataset.code);
      selectProduct(p);
    };
  });
}

function handleJanResult(jan){
  const matches = JAN_MAP[jan];
  if(!matches || matches.length===0){
    document.getElementById('manualSearch').value = jan;
    renderSearchResults(jan);
    toast('該当商品が見つかりません。手入力で検索してください');
    return;
  }
  if(matches.length===1){
    selectProduct(matches[0]);
    return;
  }
  // multiple candidates - sort by worker type match first
  const t = selectedWorker ? workerType(selectedWorker.n) : null;
  const sorted = [...matches].sort((a,b)=>{
    const aMatch = t==='A' ? a.c.endsWith('-A') : t==='B' ? a.c.endsWith('-B') : false;
    const bMatch = t==='A' ? b.c.endsWith('-A') : t==='B' ? b.c.endsWith('-B') : false;
    return (bMatch?1:0)-(aMatch?1:0);
  });
  const box = document.getElementById('searchResults');
  document.getElementById('manualSearch').value = '';
  box.innerHTML = '<div class="empty" style="text-align:left;padding:6px 2px;">候補が複数あります。選んでください</div>' +
    sorted.map(p=>`
    <div class="result-item" data-code="${escapeHtml(p.c)}">
      <div class="code mono">${escapeHtml(p.c)}</div>
      <div class="name">${escapeHtml(p.n)}</div>
    </div>`).join('');
  box.querySelectorAll('.result-item').forEach(el=>{
    el.onclick = ()=>{
      const p = matches.find(x=>x.c===el.dataset.code);
      selectProduct(p);
    };
  });
}

function selectProduct(p){
  selectedProduct = p;
  document.getElementById('searchResults').innerHTML='';
  document.getElementById('manualSearch').value='';
  document.getElementById('productSelected').innerHTML = `
    <div class="product-selected">
      <div class="code mono">${escapeHtml(p.c)}</div>
      <div class="name">${escapeHtml(p.n)}</div>
      ${p.j ? `<div class="jan mono">JAN: ${escapeHtml(p.j)}</div>` : ''}
    </div>`;
  document.getElementById('confirmCard').style.display='block';
  document.getElementById('qtyInput').value = 1;
  document.getElementById('noteInput').value = '';
  document.getElementById('confirmCard').scrollIntoView({behavior:'smooth', block:'center'});
}

/* ====================== CAMERA / ZXING ====================== */
let codeReader = null;
let cameraStream = null;

async function openCamera(){
  const modal = document.getElementById('cameraModal');
  const hint = document.getElementById('camHint');
  modal.style.display='flex';
  hint.textContent = 'カメラを起動しています…';
  try{
    if(!codeReader){ codeReader = new ZXing.BrowserMultiFormatReader(); }
    const constraints = { video: { facingMode: { ideal: 'environment' } } };
    await codeReader.decodeFromConstraints(constraints, 'video', (result, err)=>{
      if(result){
        hint.textContent = '読み取りました';
        const text = result.getText();
        closeCamera();
        handleJanResult(text);
      }
    });
    hint.textContent = 'バーコードを枠内に合わせてください';
  }catch(e){
    console.error(e);
    hint.textContent = 'カメラを起動できませんでした。手入力検索をご利用ください';
  }
}

function closeCamera(){
  const modal = document.getElementById('cameraModal');
  modal.style.display='none';
  try{ if(codeReader) codeReader.reset(); }catch(e){}
}

/* ====================== LOG / ENTRIES ====================== */
function todayStr(){
  const d = new Date();
  const pad = n=>String(n).padStart(2,'0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
}

function fmtTime(ts){
  const d = new Date(ts);
  const pad = n=>String(n).padStart(2,'0');
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

async function loadAllEntries(){
  const logArea = document.getElementById('logArea');
  logArea.innerHTML = '<div class="empty">読み込み中…</div>';
  const entries = await apiListEntries();
  entries.forEach(e=>{ e.__key = e.id; e.ts = Number(e.ts); e.qty = Number(e.qty); });
  entries.sort((a,b)=> b.ts - a.ts);
  allEntries = entries;
  populateWorkerFilter();
  renderLog();
}

function populateWorkerFilter(){
  const sel = document.getElementById('filterWorker');
  const current = sel.value;
  const codes = new Set(allEntries.map(e=>e.workerCode));
  const opts = ['<option value="">内職さん：すべて</option>'];
  WORKERS.forEach(w=>{
    if(codes.has(w.c)) opts.push(`<option value="${escapeHtml(w.c)}">${escapeHtml(w.n)}</option>`);
  });
  sel.innerHTML = opts.join('');
  sel.value = current;
}

function renderLog(){
  const logArea = document.getElementById('logArea');
  const dateF = document.getElementById('filterDate').value;
  const workerF = document.getElementById('filterWorker').value;
  let filtered = allEntries;
  if(dateF){
    filtered = filtered.filter(e=>{
      const d = new Date(e.ts);
      const pad = n=>String(n).padStart(2,'0');
      const s = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      return s === dateF;
    });
  }
  if(workerF){
    filtered = filtered.filter(e=>e.workerCode===workerF);
  }
  document.getElementById('sumCount').textContent = filtered.length;
  document.getElementById('sumQty').textContent = filtered.reduce((s,e)=>s+Number(e.qty||0),0);

  if(filtered.length===0){
    logArea.innerHTML = '<div class="empty">該当する入荷記録はありません</div>';
    return;
  }
  logArea.innerHTML = `
    <table class="log">
      <thead><tr><th>時刻</th><th>内職さん</th><th>商品</th><th>数量</th><th>備考</th><th></th></tr></thead>
      <tbody>
        ${filtered.map(e=>`
          <tr>
            <td>${fmtTime(e.ts)}</td>
            <td>${escapeHtml(e.workerName||'')}</td>
            <td><div class="mono" style="font-size:11px;color:var(--accent-dark);">${escapeHtml(e.productCode)}</div>${escapeHtml(e.productName||'')}</td>
            <td>${escapeHtml(String(e.qty))}</td>
            <td>${escapeHtml(e.note||'')}</td>
            <td><button class="del-btn" data-key="${escapeHtml(e.__key)}" title="削除">✕</button></td>
          </tr>`).join('')}
      </tbody>
    </table>`;
  logArea.querySelectorAll('.del-btn').forEach(btn=>{
    btn.onclick = async ()=>{
      if(!confirm('この記録を削除しますか？')) return;
      await apiDeleteEntry(btn.dataset.key);
      allEntries = allEntries.filter(e=>e.__key !== btn.dataset.key);
      renderLog();
    };
  });
}

async function registerEntry(){
  const qty = Number(document.getElementById('qtyInput').value)||0;
  if(qty<=0){ toast('数量を入力してください'); return; }
  const note = document.getElementById('noteInput').value.trim();
  const id = `${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
  const entry = {
    id: id,
    ts: Date.now(),
    workerCode: selectedWorker.c,
    workerName: selectedWorker.n,
    productCode: selectedProduct.c,
    productName: selectedProduct.n,
    jan: selectedProduct.j||'',
    qty: qty,
    note: note
  };
  const btn = document.getElementById('registerBtn');
  btn.disabled = true; btn.textContent = '登録中…';
  const ok = await apiAddEntry(entry);
  btn.disabled = false; btn.textContent = '登録する';
  if(!ok){ toast('登録に失敗しました。もう一度お試しください'); return; }
  entry.__key = id;
  allEntries.unshift(entry);
  populateWorkerFilter();
  renderLog();
  toast(`登録しました：${entry.productName}`);
  // reset product step, keep worker
  selectedProduct = null;
  document.getElementById('confirmCard').style.display='none';
  document.getElementById('manualSearch').value='';
  document.getElementById('searchResults').innerHTML='';
}

/* ====================== UTIL ====================== */
function escapeHtml(s){
  return String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function debounce(fn, ms){
  let t; return (...a)=>{ clearTimeout(t); t=setTimeout(()=>fn(...a), ms); };
}

/* ====================== INIT ====================== */
async function init(){
  if(!gasConfigured()){
    document.getElementById('gasWarning').style.display='block';
  }
  document.getElementById('filterDate').value = todayStr();

  document.getElementById('workerSearch').addEventListener('input', debounce(e=>renderWorkerList(e.target.value), 120));
  renderWorkerList('');

  const lastWorker = localGet('last-worker');
  if(lastWorker && WORKERS.find(w=>w.c===lastWorker.c)){
    selectedWorker = lastWorker;
  }
  renderWorkerChip();

  document.getElementById('openCameraBtn').onclick = openCamera;
  document.getElementById('closeCameraBtn').onclick = closeCamera;

  document.getElementById('manualSearch').addEventListener('input', debounce(e=>renderSearchResults(e.target.value), 150));

  document.getElementById('qtyMinus').onclick = ()=>{
    const inp = document.getElementById('qtyInput');
    inp.value = Math.max(1, (Number(inp.value)||1)-1);
  };
  document.getElementById('qtyPlus').onclick = ()=>{
    const inp = document.getElementById('qtyInput');
    inp.value = (Number(inp.value)||1)+1;
  };
  document.getElementById('cancelProductBtn').onclick = ()=>{
    selectedProduct = null;
    document.getElementById('confirmCard').style.display='none';
  };
  document.getElementById('registerBtn').onclick = registerEntry;

  document.getElementById('filterDate').addEventListener('change', renderLog);
  document.getElementById('filterWorker').addEventListener('change', renderLog);
  document.getElementById('refreshBtn').onclick = loadAllEntries;

  await loadAllEntries();
}
init();
</script>
</body>
</html>
